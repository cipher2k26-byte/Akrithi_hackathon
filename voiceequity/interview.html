<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VoiceEquity — Interview</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="toast"></div>

<div class="screen active" id="screenInterview">
  <div class="interview-room">
    <div class="ir-topbar">
      <div class="ir-title" id="irTitle">Interview</div>
      <div class="ir-progress">
        <div class="ir-prog-track"><div class="ir-prog-fill" id="irProgFill" style="width:0%"></div></div>
        <div class="ir-prog-label" id="irProgLabel">0 / 0</div>
      </div>
      <button class="btn btn-danger ir-end-btn" onclick="endInterview()">End</button>
    </div>

    <div class="ir-chat" id="irChat">
      <div class="empty-state"><div class="big">🎙️</div><h3>Interview starting…</h3></div>
    </div>

    <div class="ir-voicebar">
      <canvas class="waveform" id="waveform"></canvas>
      <div class="ir-live-transcript" id="liveTranscript">
        <div class="live-dot off" id="liveDot"></div>
        <span id="liveText">Waiting to start…</span>
      </div>
      <div class="ir-controls">
        <div class="orb-wrap" id="orbWrap">
          <div class="orb-ripple"></div>
          <div class="orb-ripple"></div>
          <button class="mic-btn" id="micBtn" onclick="toggleMic()" aria-label="Toggle microphone">
            <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 18.93V22h2v-2.07A8 8 0 0 0 20 12h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/></svg>
          </button>
        </div>
        <div class="ir-status-wrap">
          <div class="ir-status-main" id="irStatusMain">Ready</div>
          <div class="ir-status-sub" id="irStatusSub">Interview will begin shortly</div>
        </div>
        <div class="ir-ctrl-btns">
          <button class="btn btn-ghost" onclick="repeatLast()">🔁 Repeat</button>
          <button class="btn btn-ghost" onclick="skipCurrent()">⏭ Skip</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/engine.js"></script>
<script>
'use strict';
// Guard — must be a candidate with an active interview selected
const sess = DB.sess();
if (!sess) { window.location.href='auth.html'; }
else if (!sessionStorage.getItem('ve_activeIv')) { window.location.href='candidate.html'; }
else { startInterview(); }
</script>
</body>
</html>
