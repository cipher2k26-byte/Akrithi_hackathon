<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>InterviewAI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surface:#0d1320;--card:#111827;--border:#1c2538;
  --accent:#3b82f6;--accent2:#8b5cf6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  --mono:'IBM Plex Mono',monospace;--sans:'Sora',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;align-items:center;justify-content:center;overflow:hidden}
body{background-image:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(59,130,246,.07),transparent),radial-gradient(ellipse 50% 40% at 80% 100%,rgba(139,92,246,.06),transparent)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1c2538;border-radius:4px}

.wrap{width:100%;max-width:440px;margin:20px;animation:up .5s cubic-bezier(.16,1,.3,1)}
@keyframes up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}

.brand{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.brand-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(59,130,246,.3)}
.brand-name{font-size:22px;font-weight:700;letter-spacing:-.03em}
.brand-name span{color:var(--accent)}
.brand-tag{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

.step{display:none}.step.active{display:block}

/* Step 1: Role */
.step-title{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.step-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.role-card{padding:20px 16px;border:1px solid var(--border);border-radius:14px;background:var(--surface);cursor:pointer;transition:all .2s;text-align:center;user-select:none}
.role-card:hover{border-color:var(--border);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.role-card.sel{border-color:var(--accent);background:rgba(59,130,246,.07);box-shadow:0 0 0 1px rgba(59,130,246,.2)}
.role-icon{font-size:32px;margin-bottom:10px}
.role-name{font-size:14px;font-weight:600;margin-bottom:3px}
.role-desc{font-size:11px;color:var(--muted);line-height:1.5}
.btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;margin-top:8px}
.btn:hover{opacity:.88}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.outline{background:transparent;border:1px solid var(--border);color:var(--muted2);margin-top:6px}
.btn.outline:hover{border-color:var(--accent);color:var(--accent);opacity:1}

/* Step 2: Auth form */
.role-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 13px;border-radius:20px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px}
.role-badge.admin{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--amber)}
.role-badge.applicant{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--accent)}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-family:var(--sans);font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}.field input::placeholder{color:var(--muted)}.field input.err{border-color:var(--red)}
.err{font-family:var(--mono);font-size:11px;color:var(--red);min-height:18px;margin-bottom:8px}
.switch-row{margin-top:16px;text-align:center;font-size:12px;color:var(--muted)}
.switch-row a{color:var(--accent);cursor:pointer}.switch-row a:hover{text-decoration:underline}
.back-link{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;margin-bottom:20px;transition:color .15s}
.back-link:hover{color:var(--text)}

/* divider */
.divider{display:flex;align-items:center;gap:10px;margin:16px 0}
.divider span{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">🎯</div>
    <div>
      <div class="brand-name">Interview<span>AI</span></div>
      <div class="brand-tag">AI-Powered Interview Platform</div>
    </div>
  </div>

  <!-- Step 1: Pick role -->
  <div class="step active" id="step1">
    <div class="step-title">Choose your role</div>
    <div class="step-sub">How are you using InterviewAI today?</div>
    <div class="role-grid">
      <div class="role-card sel" id="cardAdmin" onclick="pickRole('admin')">
        <div class="role-icon">🛡️</div>
        <div class="role-name">Admin</div>
        <div class="role-desc">Post interviews, manage listings &amp; review applicants</div>
      </div>
      <div class="role-card" id="cardApplicant" onclick="pickRole('applicant')">
        <div class="role-icon">👤</div>
        <div class="role-name">Applicant</div>
        <div class="role-desc">Browse open interviews, apply &amp; practice with AI</div>
      </div>
    </div>
    <button class="btn" id="continueBtn" onclick="goToAuth()">Continue →</button>
  </div>

  <!-- Step 2: Auth -->
  <div class="step" id="step2">
    <div class="back-link" onclick="goBack()">← Back</div>
    <div class="role-badge" id="roleBadge">admin</div>
    <div class="step-title" id="authTitle">Welcome back</div>
    <div class="step-sub" id="authSub">Sign in to your account</div>

    <div id="signupName" style="display:none">
      <div class="field"><label>Full Name</label><input id="nameInp" type="text" placeholder="Your full name"/></div>
    </div>
    <div class="field"><label>Email</label><input id="emailInp" type="email" placeholder="you@example.com"/></div>
    <div class="field"><label>Password</label><input id="passInp" type="password" placeholder="••••••••"/></div>
    <div class="err" id="errMsg"></div>
    <button class="btn" id="authBtn" onclick="doAuth()">Sign In</button>
    <div class="divider"><span>or</span></div>
    <button class="btn outline" onclick="doGuest()">👤 Continue as Guest</button>
    <div class="switch-row"><span id="switchTxt">No account? </span><a id="switchLink" onclick="toggleMode()">Sign up</a></div>
  </div>
</div>

<script>
let role='admin', isSignup=false;

function hp(p){let h=5381;for(let i=0;i<p.length;i++)h=((h<<5)+h)^p.charCodeAt(i);return(h>>>0).toString(36);}
function getUsers(){try{return JSON.parse(localStorage.getItem('iai_users')||'{}')}catch{return{}}}
function saveUsers(u){localStorage.setItem('iai_users',JSON.stringify(u))}

// Auto-restore session
const sess=localStorage.getItem('iai_session');
if(sess){try{const s=JSON.parse(sess);redirect(s);}catch{}}

function pickRole(r){
  role=r;
  document.getElementById('cardAdmin').classList.toggle('sel',r==='admin');
  document.getElementById('cardApplicant').classList.toggle('sel',r==='applicant');
}

function goToAuth(){
  document.getElementById('step1').classList.remove('active');
  document.getElementById('step2').classList.add('active');
  const rb=document.getElementById('roleBadge');
  rb.textContent=(role==='admin'?'🛡️ Admin':'👤 Applicant');
  rb.className='role-badge '+role;
}

function goBack(){
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  document.getElementById('errMsg').textContent='';
}

function toggleMode(){
  isSignup=!isSignup;
  document.getElementById('signupName').style.display=isSignup?'block':'none';
  document.getElementById('authBtn').textContent=isSignup?'Create Account':'Sign In';
  document.getElementById('authTitle').textContent=isSignup?'Create account':'Welcome back';
  document.getElementById('authSub').textContent=isSignup?'Join InterviewAI — it\'s free':'Sign in to your account';
  document.getElementById('switchTxt').textContent=isSignup?'Have an account? ':'No account? ';
  document.getElementById('switchLink').textContent=isSignup?'Sign in':'Sign up';
  document.getElementById('errMsg').textContent='';
}

function doAuth(){
  const email=document.getElementById('emailInp').value.trim().toLowerCase();
  const pass=document.getElementById('passInp').value;
  const name=document.getElementById('nameInp').value.trim();
  const err=document.getElementById('errMsg');
  err.textContent='';
  if(!email||!pass){err.textContent='Please fill all fields.';return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='Invalid email.';return;}
  if(pass.length<6){err.textContent='Password must be 6+ characters.';return;}
  const users=getUsers(),hash=hp(pass);
  if(isSignup){
    if(!name){err.textContent='Enter your name.';return;}
    if(users[email]){err.textContent='Account already exists.';return;}
    users[email]={name,hash,role};saveUsers(users);
    launch({email,name,role});
  }else{
    const u=users[email];
    if(!u){err.textContent='No account found.';return;}
    if(u.hash!==hash){err.textContent='Incorrect password.';return;}
    launch({email,name:u.name,role:u.role||role});
  }
}

function doGuest(){
  launch({email:'guest@demo.com',name:'Guest',role,isGuest:true});
}

function launch(session){
  localStorage.setItem('iai_session',JSON.stringify(session));
  redirect(session);
}

function redirect(session){
  if(session.role==='admin') window.location.href='admin.html';
  else window.location.href='interview.html';
}

['emailInp','passInp','nameInp'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
});
</script>
</body>
</html>
