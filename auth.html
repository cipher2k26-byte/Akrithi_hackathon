<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VoiceEquity — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="toast"></div>

<!-- Welcome splash -->
<div class="screen" id="screenWelcome">
  <div style="text-align:center;z-index:1">
    <div class="welcome-icon" id="welcomeIcon">👋</div>
    <div class="welcome-name" id="welcomeName">Hey there!</div>
    <div class="welcome-sub" id="welcomeSub">Preparing your workspace…</div>
  </div>
</div>

<!-- Auth form -->
<div class="screen active" id="screenAuth">
  <div class="auth-wrap">
    <a class="auth-back" href="index.html">← Back</a>
    <div class="auth-card">
      <div class="auth-badge-row">
        <span class="badge badge-amber" id="authBadge">🎤 Candidate</span>
      </div>
      <h2 class="auth-title" id="authTitle">Welcome back</h2>
      <p class="auth-sub" id="authSub">Sign in to start your interview session</p>
      <div class="err-msg" id="authErr"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="authPass" placeholder="••••••••"/>
      </div>
      <div id="signupWrap">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="authName" placeholder="Your full name"/>
        </div>
      </div>
      <div id="adminKeyWrap">
        <div class="field">
          <label>Admin Key</label>
          <input type="password" id="adminKey" placeholder="Enter admin access key"/>
        </div>
      </div>
      <button class="btn btn-amber btn-lg" id="authBtn" onclick="doAuth()" style="width:100%">Sign In</button>
      <div id="guestRow">
        <div class="divider"><span>or</span></div>
        <button class="btn btn-ghost" onclick="doGuest()" style="width:100%">🚀 Continue as Guest</button>
      </div>
      <div class="auth-toggle">
        <span id="toggleText">Don't have an account? </span>
        <a id="toggleLink" onclick="toggleMode()">Sign up</a>
      </div>
    </div>
  </div>
</div>

<script src="js/db.js"></script>
<script>
'use strict';

// Read role from URL param
const params      = new URLSearchParams(location.search);
let currentRole   = params.get('role') || 'candidate';
let isSignup      = false;

function updateUI() {
  const isAdmin = currentRole === 'admin';
  $('authBadge').textContent  = isAdmin ? '⚙️ Admin' : '🎤 Candidate';
  $('authBadge').className    = 'badge ' + (isAdmin ? 'badge-cyan' : 'badge-amber');
  $('authTitle').textContent  = isSignup ? 'Create account' : (isAdmin ? 'Admin access' : 'Welcome back');
  $('authSub').textContent    = isAdmin ? 'Sign in with admin credentials' : 'Sign in to start your interview';
  $('adminKeyWrap').style.display = isAdmin   ? 'block' : 'none';
  $('guestRow').style.display     = isAdmin   ? 'none'  : 'block';
  $('signupWrap').style.display   = isSignup  ? 'block' : 'none';
  $('authBtn').textContent    = isSignup ? 'Create Account' : 'Sign In';
  $('toggleText').textContent = isSignup ? 'Already have an account? ' : "Don't have an account? ";
  $('toggleLink').textContent = isSignup ? 'Sign in' : 'Sign up';
  $('authErr').textContent    = '';
}

function toggleMode() { isSignup = !isSignup; updateUI(); }

function doAuth() {
  const email = $('authEmail').value.trim().toLowerCase();
  const pass  = $('authPass').value;
  const name  = $('authName')?.value.trim() || '';
  $('authErr').textContent = '';

  if (!email || !pass) { $('authErr').textContent = 'Email and password required.'; return; }

  if (currentRole === 'admin') {
    if ($('adminKey').value !== ADMIN_KEY) { $('authErr').textContent = 'Invalid admin key.'; return; }
    const users = DB.users();
    if (!users[email]) {
      users[email] = { email, name: name || 'Admin', hash: hashP(pass), role: 'admin' };
      DB.saveUsers(users);
    }
    if (users[email].hash !== hashP(pass)) { $('authErr').textContent = 'Wrong password.'; return; }
    launch(users[email], 'signin');
    return;
  }

  const users = DB.users();
  if (isSignup) {
    if (!name) { $('authErr').textContent = 'Name is required.'; return; }
    if (users[email]) { $('authErr').textContent = 'Account exists — sign in instead.'; return; }
    users[email] = { email, name, hash: hashP(pass), role: 'candidate' };
    DB.saveUsers(users);
    launch(users[email], 'signup');
  } else {
    if (!users[email]) { $('authErr').textContent = 'No account found — sign up first.'; return; }
    if (users[email].hash !== hashP(pass)) { $('authErr').textContent = 'Wrong password.'; return; }
    launch(users[email], 'signin');
  }
}

function doGuest() {
  launch({ email:'guest@demo.com', name:'Guest', role:'candidate' }, 'guest');
}

function launch(user, mode) {
  DB.setSess(user);
  $('welcomeIcon').textContent = user.role==='admin' ? '⚙️' : '🎤';
  $('welcomeName').textContent = `Hey, ${user.name.split(' ')[0]}!`;
  $('welcomeSub').textContent  = mode==='signup' ? "Account created — let's go!" : mode==='guest' ? 'Demo mode active.' : 'Good to see you again.';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('screenWelcome').classList.add('active');
  setTimeout(() => {
    window.location.href = user.role==='admin' ? 'admin.html' : 'candidate.html';
  }, 1500);
}

// Keyboard submit
['authEmail','authPass','authName','adminKey'].forEach(id => {
  const el=$(id); if(el) el.addEventListener('keydown', e=>{ if(e.key==='Enter') doAuth(); });
});

// Init
updateUI();
// If already logged in skip auth
(function(){ const s=DB.sess(); if(s) window.location.href=s.role==='admin'?'admin.html':'candidate.html'; })();
</script>
</body>
</html>
